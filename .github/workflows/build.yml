name: Build NeoChess

on:
  push:
    branches:
      - main

jobs:

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx electron-builder --win portable

      - uses: actions/upload-artifact@v4
        with:
          name: NeoChess-Windows
          path: dist/


  linux:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx electron-builder --linux AppImage deb

      - uses: actions/upload-artifact@v4
        with:
          name: NeoChess-Linux
          path: dist/
